name: release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify and publish.
        required: true
        default: v1.0.0
      dry_run:
        description: Run npm publish in dry-run mode.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="$VERSION" node -e 'const pkg = require("./package.json"); const version = process.env.VERSION; if (pkg.version !== version) { console.error(`package.json version ${pkg.version} does not match ${version}`); process.exit(1); } if (pkg.bin?.["agentic-workflow-guard"] !== "bin/agentic-workflow-guard.js") { console.error("package.json bin.agentic-workflow-guard is not publish-safe"); process.exit(1); }'

      - run: npm test
      - run: npm run release:sync:check
      - run: npm run docs:build
      - run: npm run smoke:package
      - run: npm pack --dry-run

      - name: Require NPM_TOKEN for real publish
        if: ${{ steps.release.outputs.dry_run != 'true' }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN repository secret is required for publishing to npm." >&2
            exit 1
          fi

      - name: Run release gate
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [ "$DRY_RUN" = "true" ]; then
            npm run release:check -- --target "$VERSION"
          else
            npm run release:check -- --target "$VERSION" --require-npm-auth
          fi

      - name: Publish to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npm publish --dry-run --provenance --access public
          else
            npm publish --provenance --access public
          fi
