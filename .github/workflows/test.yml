name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node ./bin/agentic-workflow-guard.js scan examples/vulnerable-github-action --format sarif > awg.sarif || test "$?" = "1"
