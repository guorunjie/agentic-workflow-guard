name: Agentic Workflow Guard
description: Security scanner and portable skill pack for AI automation workflows, prompt-injection paths, risky tools, and overpowered permissions.
branding:
  icon: shield
  color: purple
inputs:
  path:
    description: Repository path to scan.
    required: false
    default: .
  format:
    description: Output format: markdown, json, or sarif.
    required: false
    default: sarif
  output:
    description: Optional report output file. Defaults to awg.sarif for SARIF scans.
    required: false
    default: awg.sarif
runs:
  using: composite
  steps:
    - name: Run Agentic Workflow Guard
      shell: bash
      run: |
        if [ -n "${{ inputs.output }}" ]; then
          node "$GITHUB_ACTION_PATH/bin/agentic-workflow-guard.js" scan "${{ inputs.path }}" --format "${{ inputs.format }}" > "${{ inputs.output }}"
        else
          node "$GITHUB_ACTION_PATH/bin/agentic-workflow-guard.js" scan "${{ inputs.path }}" --format "${{ inputs.format }}"
        fi
