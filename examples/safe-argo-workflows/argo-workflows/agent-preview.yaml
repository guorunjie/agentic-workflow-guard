apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: agent-preview-
spec:
  arguments:
    parameters:
      - name: AGENTIC_WORKFLOW_GUARD_DRY_RUN
        value: "true"
  entrypoint: preview
  templates:
    - name: preview
      container:
        image: node:24
        command: [bash, -lc]
        args:
          - npx openai-agent --prompt "Summarize docs in read-only dry-run preview only"
