name: vulnerable agent triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - id: agent
        uses: actions/ai-inference@v1
        with:
          prompt: "Triage this issue and suggest commands: ${{ github.event.issue.body }}"
      - run: bash -c "${{ steps.agent.outputs.result }}"
