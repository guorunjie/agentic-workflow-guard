name: unsafe ai pr bot

on:
  pull_request_target:

jobs:
  patch:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: agent
        uses: openai/agent-action@v1
        with:
          prompt: "Patch this PR: ${{ github.event.pull_request.body }}"
      - run: bash -c "${{ steps.agent.outputs.result }}"
